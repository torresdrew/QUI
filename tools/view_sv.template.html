<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>QUI SavedVariables Viewer</title>
<style>
  :root {
    --bg:        #0d1117;
    --bg-2:      #161b22;
    --bg-3:      #1c2128;
    --border:    #30363d;
    --text:      #e6edf3;
    --text-dim:  #8b949e;
    --accent:    #34D399;
    --accent-d:  #10b981;
    --warn:      #f0883e;
    --add:       #3fb950;
    --del:       #f85149;
    --change:    #d29922;
    --key-num:   #79c0ff;
    --key-str:   #d2a8ff;
    --val-str:   #a5d6ff;
    --val-num:   #f0883e;
    --val-bool:  #ff7b72;
    --val-null:  #8b949e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  header h1 {
    margin: 0 12px 0 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  header .meta { color: var(--text-dim); font-size: 11px; margin-right: auto; }
  header input[type="search"], header select, header button {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font: inherit;
    font-size: 12px;
  }
  header input[type="search"] { width: 280px; }
  header button { cursor: pointer; }
  header button:hover { border-color: var(--accent); }
  header label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
  }
  nav {
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 12px;
  }
  nav button {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    padding: 8px 14px;
    cursor: pointer;
    font: inherit;
    font-size: 12px;
  }
  nav button:hover { color: var(--text); }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .subnav {
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    color: var(--text-dim);
    font-size: 12px;
  }
  .subnav.hidden { display: none; }
  .subnav select { min-width: 220px; }
  main {
    flex: 1;
    overflow: auto;
    padding: 8px 0;
  }
  .empty {
    color: var(--text-dim);
    padding: 24px;
    text-align: center;
  }
  .tree { padding: 0 12px; }
  details {
    margin-left: 14px;
  }
  details > summary {
    cursor: pointer;
    list-style: none;
    padding: 1px 4px;
    border-radius: 3px;
    user-select: none;
    line-height: 1.5;
  }
  details > summary::-webkit-details-marker { display: none; }
  details > summary::before {
    content: "▶";
    display: inline-block;
    width: 12px;
    color: var(--text-dim);
    font-size: 9px;
    transition: transform 0.1s;
  }
  details[open] > summary::before { transform: rotate(90deg); }
  details > summary:hover { background: var(--bg-2); }
  .leaf {
    margin-left: 26px;
    padding: 1px 4px;
    line-height: 1.5;
  }
  .key-num   { color: var(--key-num); }
  .key-str   { color: var(--key-str); }
  .sep       { color: var(--text-dim); margin: 0 6px; }
  .val-str   { color: var(--val-str); }
  .val-num   { color: var(--val-num); }
  .val-bool  { color: var(--val-bool); }
  .val-null  { color: var(--val-null); font-style: italic; }
  .summary-info {
    color: var(--text-dim);
    margin-left: 8px;
    font-size: 11px;
  }
  /* Diff highlighting */
  .diff-default { opacity: 0.42; }
  .diff-changed > summary,
  .diff-changed.leaf,
  .leaf.diff-changed { background: rgba(210, 153, 34, 0.10); }
  .diff-added > summary,
  .diff-added.leaf,
  .leaf.diff-added { background: rgba(63, 185, 80, 0.12); }
  .diff-removed > summary,
  .diff-removed.leaf,
  .leaf.diff-removed { background: rgba(248, 81, 73, 0.12); }
  .diff-badge {
    margin-left: 6px;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--bg);
    font-weight: 600;
    vertical-align: middle;
  }
  .diff-badge.changed { background: var(--change); }
  .diff-badge.added   { background: var(--add); }
  .diff-badge.removed { background: var(--del); }
  /* Search hide */
  .search-hidden { display: none !important; }
  /* Search match highlight */
  mark { background: rgba(52, 211, 153, 0.35); color: inherit; padding: 0 1px; border-radius: 2px; }

  footer {
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    padding: 4px 12px;
    color: var(--text-dim);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<header>
  <h1>QUI SavedVariables</h1>
  <span class="meta" id="meta-info"></span>
  <input type="search" id="search" placeholder="Search keys/values… (regex with /pattern/)">
  <label title="On Profiles tab: hide keys whose values match defaults"><input type="checkbox" id="diff-only"> diff only</label>
  <label title="On Profiles tab: highlight added/changed/removed vs defaults"><input type="checkbox" id="diff-mark" checked> mark diffs</label>
  <button id="expand-all" title="Expand visible">expand</button>
  <button id="collapse-all" title="Collapse all">collapse</button>
</header>
<nav id="tabs"></nav>
<div class="subnav hidden" id="subnav">
  <label for="picker" id="picker-label">Pick:</label>
  <select id="picker"></select>
  <span id="picker-count" class="meta"></span>
</div>
<main id="view"><div class="empty">Loading…</div></main>
<footer>
  <span id="footer-stats"></span>
  <span>tools/view_sv.lua</span>
</footer>

<script type="application/json" id="sv-data">__SV_DATA__</script>
<script>
(function () {
  "use strict";

  // ---- Load embedded data --------------------------------------------------
  const dataNode = document.getElementById("sv-data");
  let DATA;
  try {
    DATA = JSON.parse(dataNode.textContent);
  } catch (e) {
    document.getElementById("view").innerHTML =
      '<div class="empty">Failed to parse embedded JSON: ' + (e.message || e) + '</div>';
    return;
  }

  const QUI_DB   = DATA.QUI_DB   || {};
  const QUIDB    = DATA.QUIDB    || {};
  const DEFAULTS = DATA.defaults || {};

  // ---- Meta strip ----------------------------------------------------------
  const profiles = QUI_DB.profiles || {};
  const chars    = QUIDB.char || {};
  const profileNames = Object.keys(profiles).sort();
  const charNames    = Object.keys(chars).sort();

  document.getElementById("meta-info").textContent =
    DATA.meta.sourceName +
    "  •  " + profileNames.length + " profiles" +
    "  •  " + charNames.length + " chars" +
    "  •  generated " + DATA.meta.generated;

  // ---- Tabs ----------------------------------------------------------------
  const TABS = [
    { id: "profiles", label: "Profiles",   count: profileNames.length },
    { id: "chars",    label: "Chars",      count: charNames.length },
    { id: "global",   label: "Global",     count: countKeys(QUI_DB.global) + countKeys(QUIDB.global) },
    { id: "profileKeys", label: "Profile Keys", count: countKeys(QUI_DB.profileKeys) },
    { id: "defaults", label: "Defaults",   count: countKeys(DEFAULTS.profile) },
    { id: "raw",      label: "Raw",        count: 2 },
  ];

  const tabsEl = document.getElementById("tabs");
  TABS.forEach(t => {
    const b = document.createElement("button");
    b.dataset.tab = t.id;
    b.textContent = t.label + (t.count != null ? " (" + t.count + ")" : "");
    b.addEventListener("click", () => switchTab(t.id));
    tabsEl.appendChild(b);
  });

  function countKeys(o) {
    if (!o || typeof o !== "object") return 0;
    return Object.keys(o).length;
  }

  // ---- State ---------------------------------------------------------------
  const state = {
    tab: "profiles",
    pick: null,           // selected profile / char name
    search: "",
    diffOnly: false,
    diffMark: true,
  };

  // ---- Tree rendering ------------------------------------------------------
  // We render once per (tab, pick) and then apply search/diff visibility
  // imperatively. The tree carries a `data-path` attribute on every node
  // so we can re-evaluate filters cheaply without re-rendering.

  function isNumericKey(k) {
    return /^-?\d+(?:\.\d+)?$/.test(k);
  }

  function valueClass(v) {
    if (v === null) return "val-null";
    const t = typeof v;
    if (t === "string")  return "val-str";
    if (t === "number")  return "val-num";
    if (t === "boolean") return "val-bool";
    return "";
  }

  function renderLeaf(key, value, defaultValue, hasDefault, path) {
    const div = document.createElement("div");
    div.className = "leaf";
    div.dataset.path = path;
    if (key !== null) {
      const ks = document.createElement("span");
      ks.className = isNumericKey(key) ? "key-num" : "key-str";
      ks.textContent = isNumericKey(key) ? "[" + key + "]" : key;
      div.appendChild(ks);
      const sep = document.createElement("span");
      sep.className = "sep";
      sep.textContent = "=";
      div.appendChild(sep);
    }
    const vs = document.createElement("span");
    vs.className = valueClass(value);
    vs.textContent = formatLeaf(value);
    div.appendChild(vs);

    // searchable text on the node so the filter pass can grep cheaply
    const k = key === null ? "" : String(key);
    div.dataset.search = (k + " " + formatLeaf(value)).toLowerCase();

    if (state.diffMark) {
      annotateDiff(div, value, defaultValue, hasDefault, /*isContainer=*/false);
    }
    return div;
  }

  function formatLeaf(v) {
    if (v === null)            return "nil";
    if (typeof v === "string") return JSON.stringify(v);
    return String(v);
  }

  function isContainer(v) {
    return v !== null && typeof v === "object";
  }

  function isArrayLike(v) {
    return Array.isArray(v);
  }

  function renderContainer(key, value, defaultValue, hasDefault, path, openInitially) {
    const det = document.createElement("details");
    det.dataset.path = path;
    if (openInitially) det.open = true;
    const sum = document.createElement("summary");

    if (key !== null) {
      const ks = document.createElement("span");
      ks.className = isNumericKey(key) ? "key-num" : "key-str";
      ks.textContent = isNumericKey(key) ? "[" + key + "]" : key;
      sum.appendChild(ks);
      sum.appendChild(document.createTextNode(" "));
    }

    const isArr = isArrayLike(value);
    const childCount = isArr ? value.length : Object.keys(value).length;
    const info = document.createElement("span");
    info.className = "summary-info";
    info.textContent = isArr
      ? "[" + childCount + "]"
      : "{" + childCount + "}";
    sum.appendChild(info);

    if (state.diffMark) {
      annotateDiff(det, value, defaultValue, hasDefault, /*isContainer=*/true);
    }

    det.appendChild(sum);

    // Build searchable text from key only for the summary line; descendants
    // contribute their own dataset.search entries.
    const k = key === null ? "" : String(key);
    det.dataset.search = (k + " " + (isArr ? "array" : "table")).toLowerCase();

    // Render children. For huge containers (>500), lazy-render on first open.
    const LAZY_THRESHOLD = 500;
    if (childCount > LAZY_THRESHOLD) {
      const pending = document.createElement("div");
      pending.className = "leaf";
      pending.style.color = "var(--text-dim)";
      pending.textContent = "(" + childCount + " entries — open to load)";
      det.appendChild(pending);
      det.addEventListener("toggle", function once() {
        if (!det.open) return;
        det.removeEventListener("toggle", once);
        det.removeChild(pending);
        appendChildren(det, value, defaultValue, hasDefault, path);
      });
    } else {
      appendChildren(det, value, defaultValue, hasDefault, path);
    }

    return det;
  }

  function appendChildren(det, value, defaultValue, hasDefault, path) {
    const isArr = isArrayLike(value);
    if (isArr) {
      for (let i = 0; i < value.length; i++) {
        const child = value[i];
        const idx = i + 1; // Lua 1-indexed
        const childPath = path + "[" + idx + "]";
        const dv = (hasDefault && Array.isArray(defaultValue)) ? defaultValue[i] : undefined;
        const dvHas = hasDefault && Array.isArray(defaultValue) && i < defaultValue.length;
        det.appendChild(renderNode(idx, child, dv, dvHas, childPath));
      }
    } else {
      // Sort: numeric keys ascending, then string keys alpha
      const keys = Object.keys(value).sort(keyComparator);
      for (const k of keys) {
        const childPath = path + "." + k;
        const child = value[k];
        const dv = (hasDefault && defaultValue && typeof defaultValue === "object" && !Array.isArray(defaultValue))
          ? defaultValue[k] : undefined;
        const dvHas = hasDefault && defaultValue && typeof defaultValue === "object"
          && !Array.isArray(defaultValue) && (k in defaultValue);
        det.appendChild(renderNode(k, child, dv, dvHas, childPath));
      }
    }
  }

  function keyComparator(a, b) {
    const an = isNumericKey(a), bn = isNumericKey(b);
    if (an && bn) return parseFloat(a) - parseFloat(b);
    if (an) return -1;
    if (bn) return 1;
    return a < b ? -1 : a > b ? 1 : 0;
  }

  function renderNode(key, value, defaultValue, hasDefault, path) {
    if (isContainer(value)) {
      return renderContainer(key, value, defaultValue, hasDefault, path, /*open=*/false);
    }
    return renderLeaf(key, value, defaultValue, hasDefault, path);
  }

  // ---- Diff annotation -----------------------------------------------------
  // A node is:
  //   added    = present in value, missing in defaults
  //   removed  = missing in value, present in defaults  (rendered separately
  //              via mergeWithDefaults during diff-only / full-walk cases)
  //   changed  = both present, leaf values differ OR container has any
  //              descendant that's added/changed/removed
  //   default  = both present, equal (or recursively all-default)
  //
  // We compute for a node's own value at render time. Containers compute
  // their own status via shallow strict equality over their full subtree
  // — done lazily with deepEqual so it's fine for the data sizes involved.

  function deepEqual(a, b) {
    if (a === b) return true;
    if (a === null || b === null) return false;
    if (typeof a !== "object" || typeof b !== "object") return false;
    const aArr = Array.isArray(a), bArr = Array.isArray(b);
    if (aArr !== bArr) return false;
    if (aArr) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (!deepEqual(a[i], b[i])) return false;
      return true;
    }
    const ak = Object.keys(a), bk = Object.keys(b);
    if (ak.length !== bk.length) return false;
    for (const k of ak) if (!deepEqual(a[k], b[k])) return false;
    return true;
  }

  function annotateDiff(el, value, defaultValue, hasDefault, isCtr) {
    if (!hasDefault) {
      el.classList.add("diff-added");
      addBadge(el, "added");
      return "added";
    }
    if (deepEqual(value, defaultValue)) {
      el.classList.add("diff-default");
      return "default";
    }
    el.classList.add("diff-changed");
    addBadge(el, "changed");
    return "changed";
  }

  function addBadge(el, kind) {
    const target = el.tagName === "DETAILS" ? el.querySelector("summary") : el;
    const b = document.createElement("span");
    b.className = "diff-badge " + kind;
    b.textContent = kind;
    target.appendChild(b);
  }

  // ---- Search filter -------------------------------------------------------
  // A node is "matched" if its own dataset.search contains the query, OR if
  // any descendant matches. Visible ancestors auto-open.

  function applyFilters() {
    const root = document.getElementById("view");
    const q = state.search;
    let regex = null;
    if (q.length >= 2 && q.startsWith("/") && q.endsWith("/")) {
      try { regex = new RegExp(q.slice(1, -1), "i"); } catch (_) { /* ignore */ }
    }
    const ql = q.toLowerCase();

    // First pass: clear any prior search-hidden classes
    root.querySelectorAll(".search-hidden").forEach(n => n.classList.remove("search-hidden"));

    if (!q && !state.diffOnly) {
      // nothing to filter
      return;
    }

    // Walk all leaves & containers bottom-up to compute visibility
    // (post-order traversal so containers know their descendants' state)
    const allNodes = root.querySelectorAll("[data-path]");
    // Build parent->children map by walking once
    const visibleSet = new WeakSet();

    // First mark direct matches (leaves + containers)
    allNodes.forEach(n => {
      const text = n.dataset.search || "";
      let matchesSearch = !q;
      if (q) {
        if (regex) matchesSearch = regex.test(text);
        else matchesSearch = text.indexOf(ql) >= 0;
      }
      let matchesDiff = !state.diffOnly;
      if (state.diffOnly) {
        // hide pure-default subtrees
        matchesDiff = !n.classList.contains("diff-default") || hasNonDefaultDescendant(n);
      }
      if (matchesSearch && matchesDiff) {
        visibleSet.add(n);
        // bubble visibility to ancestors so they stay open
        let p = n.parentElement;
        while (p && p !== root) {
          if (p.matches("details, .leaf")) visibleSet.add(p);
          p = p.parentElement;
        }
      }
    });

    allNodes.forEach(n => {
      if (!visibleSet.has(n)) {
        n.classList.add("search-hidden");
      } else if (n.tagName === "DETAILS" && q) {
        n.open = true;
      }
    });
  }

  // Cache per-render: descendants set on each container.
  function hasNonDefaultDescendant(el) {
    if (el.tagName !== "DETAILS") return !el.classList.contains("diff-default");
    const all = el.querySelectorAll("[data-path]");
    for (const c of all) {
      if (!c.classList.contains("diff-default")) return true;
    }
    return false;
  }

  // ---- Tab switching -------------------------------------------------------
  function switchTab(id) {
    state.tab = id;
    document.querySelectorAll("nav button").forEach(b => {
      b.classList.toggle("active", b.dataset.tab === id);
    });

    const subnav = document.getElementById("subnav");
    const picker = document.getElementById("picker");
    const pickerLabel = document.getElementById("picker-label");
    picker.innerHTML = "";

    if (id === "profiles") {
      subnav.classList.remove("hidden");
      pickerLabel.textContent = "Profile:";
      profileNames.forEach(n => {
        const o = document.createElement("option");
        o.value = n; o.textContent = n;
        picker.appendChild(o);
      });
      state.pick = profileNames[0] || null;
      picker.value = state.pick || "";
      picker.onchange = () => { state.pick = picker.value; render(); };
    } else if (id === "chars") {
      subnav.classList.remove("hidden");
      pickerLabel.textContent = "Char:";
      charNames.forEach(n => {
        const o = document.createElement("option");
        o.value = n; o.textContent = n;
        picker.appendChild(o);
      });
      state.pick = charNames[0] || null;
      picker.value = state.pick || "";
      picker.onchange = () => { state.pick = picker.value; render(); };
    } else {
      subnav.classList.add("hidden");
      state.pick = null;
    }

    render();
  }

  function render() {
    const view = document.getElementById("view");
    view.innerHTML = "";
    const tree = document.createElement("div");
    tree.className = "tree";

    let value, defaultValue, hasDefault, label;

    if (state.tab === "profiles") {
      if (!state.pick) {
        tree.innerHTML = '<div class="empty">No profiles in this SV file.</div>';
        view.appendChild(tree);
        return;
      }
      value = profiles[state.pick];
      defaultValue = DEFAULTS.profile;
      hasDefault = true;
      label = "profiles." + state.pick;
    } else if (state.tab === "chars") {
      if (!state.pick) {
        tree.innerHTML = '<div class="empty">No characters in this SV file.</div>';
        view.appendChild(tree);
        return;
      }
      value = chars[state.pick];
      defaultValue = DEFAULTS.char || {};
      hasDefault = !!DEFAULTS.char;
      label = "char." + state.pick;
    } else if (state.tab === "global") {
      value = { QUI_DB_global: QUI_DB.global || {}, QUIDB_global: QUIDB.global || {} };
      defaultValue = { QUI_DB_global: DEFAULTS.global || {}, QUIDB_global: {} };
      hasDefault = !!DEFAULTS.global;
      label = "global";
    } else if (state.tab === "profileKeys") {
      value = QUI_DB.profileKeys || {};
      defaultValue = undefined;
      hasDefault = false;
      label = "profileKeys";
    } else if (state.tab === "defaults") {
      value = DEFAULTS;
      defaultValue = undefined;
      hasDefault = false;
      label = "defaults";
    } else if (state.tab === "raw") {
      value = { QUI_DB: QUI_DB, QUIDB: QUIDB };
      defaultValue = undefined;
      hasDefault = false;
      label = "raw";
    }

    const root = renderNode(label, value, defaultValue, hasDefault, label);
    if (root.tagName === "DETAILS") root.open = true;
    tree.appendChild(root);
    view.appendChild(tree);

    updateFooter();
    applyFilters();
  }

  function updateFooter() {
    const view = document.getElementById("view");
    const total = view.querySelectorAll("[data-path]").length;
    document.getElementById("footer-stats").textContent = total + " nodes rendered";
  }

  // ---- Bindings ------------------------------------------------------------
  document.getElementById("search").addEventListener("input", e => {
    state.search = e.target.value;
    applyFilters();
  });
  document.getElementById("diff-only").addEventListener("change", e => {
    state.diffOnly = e.target.checked;
    applyFilters();
  });
  document.getElementById("diff-mark").addEventListener("change", e => {
    state.diffMark = e.target.checked;
    render();
  });
  document.getElementById("expand-all").addEventListener("click", () => {
    document.querySelectorAll("#view details:not(.search-hidden)").forEach(d => d.open = true);
  });
  document.getElementById("collapse-all").addEventListener("click", () => {
    document.querySelectorAll("#view details").forEach(d => d.open = false);
  });

  // ---- Boot ----------------------------------------------------------------
  switchTab("profiles");
})();
</script>
</body>
</html>
